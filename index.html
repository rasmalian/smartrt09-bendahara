<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Warga</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:#f5f6fa;
}

.header{
  background:#007bff;
  color:white;
  padding:15px;
  text-align:center;
}

.menu{
  display:flex;
  background:white;
}

.menu a{
  flex:1;
  padding:12px;
  text-align:center;
  text-decoration:none;
  color:#333;
  border-bottom:2px solid transparent;
}

.menu a.active{
  border-bottom:2px solid #007bff;
  font-weight:bold;
}

.container{
  padding:10px;
  max-width:600px;
  margin:auto;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info{
  font-size:14px;
}

.badge{
  background:#eee;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.warn{
  background:#ffdddd;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#28a745;
  color:white;
}

</style>
</head>

<body>

<div class="header">
  <h3>Dashboard Warga</h3>
</div>

<div class="menu">
  <a href="#" class="active">Warga</a>
  <a href="transaksi.html">Transaksi</a>
</div>

<div class="container" id="list"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxJAdcpu11QGuRhjNwwC3w9Efr4EMvAEai25SQs5xtRULh30oOj6u5h4CGMDLqL0e3_AA/exec";

function el(id){ return document.getElementById(id); }

// =======================
function normalize(val){
  if(!val) return "-";

  if(typeof val === "string" && val.length === 7) return val;

  const d = new Date(val);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

// =======================
function pnum(p){
  const [y,m] = p.split("-").map(Number);
  return y*12+m;
}

// =======================
async function load(){

  const res = await fetch(API+"?action=getWarga");
  const data = await res.json();

  const container = el("list");
  container.innerHTML = "";

  const now = new Date();
  const nowp = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");

  data.forEach(w=>{

    const last = normalize(w.bayarterakhir);

    let warn = "";
    if(last !== "-" && pnum(last) < pnum(nowp)){
      warn = "warn";
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="info">
        <b>${w.nama}</b><br>
        ${w.alamat}<br>
        <span class="badge ${warn}">Last: ${last}</span>
      </div>

      <button onclick="bayar('${w.nama}')">Bayar</button>
    `;

    container.appendChild(div);
  });

}

// =======================
function bayar(nama){
  // redirect ke iuran dengan parameter
  window.location.href = "iuran.html?nama=" + encodeURIComponent(nama);
}

// =======================
load();

</script>

</body>
</html>
