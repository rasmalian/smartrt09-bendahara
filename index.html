<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}
.container{padding:15px;max-width:500px;margin:auto}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:10px}
.preview{background:#eef;padding:10px;border-radius:8px}
</style>
</head>
<body>

<div class="container">

<div class="card">
<select id="nama" onchange="pilihWarga()"></select>
<input id="alamat" readonly>
</div>

<div class="card">
<input type="month" id="periode">
<input type="number" id="jumlah" value="1">
<div id="preview" class="preview"></div>
</div>

<div class="card">
<label><input type="checkbox" id="keamanan"> Keamanan</label>
<label><input type="checkbox" id="sampah"> Sampah</label>
<label><input type="checkbox" id="pembangunan"> Pembangunan</label>
<label><input type="checkbox" id="kas"> Kas</label>
</div>

<div class="card">
<select id="metode">
<option value="transfer">Transfer</option>
<option value="tunai">Tunai</option>
</select>
<input id="ket">
</div>

<button onclick="submitData()">Simpan</button>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycby9IDHY62fYMHONxcj0nP-D5Y9-zAJpYaMiWUPKLEtSxcjm26lmGns_IFp17eq1Baf2sQ/exec";

let wargaData=[];

async function loadWarga(){
 const res=await fetch(API+"?action=getWarga");
 wargaData=await res.json();

 const el=document.getElementById("nama");
 el.innerHTML="<option>Pilih</option>";
 wargaData.forEach(w=>{
   el.innerHTML+=`<option value="${w.nama}">${w.nama}</option>`;
 });
}

function pilihWarga(){
 const nama=document.getElementById("nama").value;
 const w=wargaData.find(x=>x.nama===nama);
 if(!w)return;

 document.getElementById("alamat").value=w.alamat;
 document.getElementById("periode").value=w.bayarterakhir;

 set("keamanan",w.keamanan);
 set("sampah",w.sampah);
 set("pembangunan",w.pembangunan);
 set("kas",w.kas);
}

function set(id,val){
 const el=document.getElementById(id);
 el.checked=Number(val)===1;
 el.disabled=Number(val)===0;
}

function genPeriode(p,j){
 let [y,m]=p.split("-").map(Number);
 let r=[];
 for(let i=1;i<=j;i++){
  let mm=m+i,yy=y;
  while(mm>12){mm-=12;yy++}
  r.push(`${yy}-${String(mm).padStart(2,"0")}`);
 }
 return r;
}

function updatePreview(){
 const p=document.getElementById("periode").value;
 const j=parseInt(document.getElementById("jumlah").value);
 if(!p||!j)return;
 const list=genPeriode(p,j);
 document.getElementById("preview").innerHTML=list.join("<br>");
}

document.getElementById("jumlah").oninput=updatePreview;
document.getElementById("periode").oninput=updatePreview;

async function submitData(){
 const data={
  action:"addIuran",
  nama:nama.value,
  alamat:alamat.value,
  periode_terakhir:periode.value,
  jumlah_bulan:parseInt(jumlah.value),
  keamanan:keamanan.checked,
  sampah:sampah.checked,
  pembangunan:pembangunan.checked,
  kas:kas.checked,
  metode:metode.value,
  keterangan:ket.value
 };

 const res=await fetch(API,{method:"POST",body:JSON.stringify(data)});
 const r=await res.json();

 alert("OK total:"+r.total);
}

loadWarga();
</script>

</body>
</html>
