<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}
.container{padding:15px;max-width:500px;margin:auto}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:14px;background:#007bff;color:white;border:none;border-radius:10px}
.preview{background:#eef;padding:10px;border-radius:8px}
.warn{color:red;font-size:13px}
</style>
</head>
<body>

<div class="container">

<div class="card">
<select id="nama" onchange="pilihWarga()"></select>
<input id="alamat" readonly>
<b>Terakhir bayar:</b>
<div id="last"></div>
<div id="warn" class="warn"></div>
</div>

<div class="card">
<input id="jumlah" type="number" value="1">
<div id="preview" class="preview"></div>
</div>

<div class="card">
<label><input type="checkbox" id="keamanan"> Keamanan</label>
<label><input type="checkbox" id="sampah"> Sampah</label>
<label><input type="checkbox" id="pembangunan"> Pembangunan</label>
<label><input type="checkbox" id="kas"> Kas</label>
</div>

<div class="card">
<select id="metode">
<option value="transfer">Transfer</option>
<option value="tunai">Tunai</option>
</select>
<input id="ket">
</div>

<button onclick="submit()">Simpan</button>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxP27F3e_mrsO7609YRYotsL7IcKIbIb6bWYd6p_qIMsIa5SKuj7BgS2H52-Y_dnUIEiA/exec";
let wargaData=[],last=null;

function norm(v){
 if(!v) return null;
 if(typeof v==="string" && v.length===7) return v;
 const d=new Date(v);
 return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function pnum(p){
 const [y,m]=p.split("-").map(Number);
 return y*12+m;
}

async function load(){
 const r=await fetch(API+"?action=getWarga");
 wargaData=await r.json();

 nama.innerHTML="<option>Pilih</option>";
 wargaData.forEach(w=>{
   nama.innerHTML+=`<option value="${w.nama}">${w.nama}</option>`;
 });
}

function pilihWarga(){
 const w=wargaData.find(x=>x.nama===nama.value);
 if(!w) return;

 alamat.value=w.alamat;
 last=norm(w.bayarterakhir);

 lastEl.innerText=last||"-";

 set("keamanan",w.keamanan);
 set("sampah",w.sampah);
 set("pembangunan",w.pembangunan);
 set("kas",w.kas);

 cek();
 prev();
}

function set(id,v){
 const e=document.getElementById(id);
 e.checked=Number(v)===1;
 e.disabled=Number(v)===0;
}

function gen(l,j){
 let [y,m]=l.split("-").map(Number),r=[];
 for(let i=1;i<=j;i++){
  let mm=m+i,yy=y;
  while(mm>12){mm-=12;yy++}
  r.push(`${yy}-${String(mm).padStart(2,"0")}`);
 }
 return r;
}

function prev(){
 if(!last) return;
 const j=parseInt(jumlah.value);
 const list=gen(last,j);
 preview.innerHTML=list.join("<br>");
}

jumlah.oninput=prev;

function cek(){
 const now=new Date();
 const nowp=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
 warn.innerText = pnum(last)<pnum(nowp) ? "⚠️ Tunggakan" : "";
}

async function submit(){
 const data={
  action:"addIuran",
  nama:nama.value,
  alamat:alamat.value,
  periode_terakhir:last,
  jumlah_bulan:parseInt(jumlah.value),
  keamanan:keamanan.checked,
  sampah:sampah.checked,
  pembangunan:pembangunan.checked,
  kas:kas.checked,
  metode:metode.value,
  keterangan:ket.value
 };

 const r=await fetch(API,{method:"POST",body:JSON.stringify(data)});
 const res=await r.json();

 alert("OK "+res.total);
 location.reload();
}

load();
</script>

</body>
</html>
