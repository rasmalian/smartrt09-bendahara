<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:#f5f6fa;
}

.container{
  max-width:480px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.check{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.check:last-child{
  border:none;
}

.total{
  font-size:18px;
  font-weight:bold;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<select id="nama"></select>
<input id="alamat" readonly>
</div>

<div class="card">
<label>Jumlah bulan</label>
<input type="number" id="jumlah" value="1">
</div>

<div class="card">

<div class="check">
  <label>Keamanan</label>
  <input type="checkbox" id="keamanan">
</div>

<div class="check">
  <label>Sampah</label>
  <input type="checkbox" id="sampah">
</div>

<div class="check">
  <label>Pembangunan</label>
  <input type="checkbox" id="pembangunan">
</div>

<div class="check">
  <label>Kas</label>
  <input type="checkbox" id="kas">
</div>

</div>

<div class="card total">
Total: Rp <span id="total">0</span>
</div>

<div class="card">
<select id="metode">
<option value="transfer">Transfer</option>
<option value="tunai">Tunai</option>
</select>

<input id="ket" placeholder="Keterangan">
</div>

<button onclick="submit()">Simpan</button>

</div>

<script>

const API="ISI_URL_GAS";
let BIAYA={};

// =================
// INIT
// =================
async function init(){

  const warga = await fetch(API+"?action=getWarga").then(r=>r.json());
  BIAYA = await fetch(API+"?action=getBiaya").then(r=>r.json());

  console.log("BIAYA:", BIAYA); // DEBUG

  const select=document.getElementById("nama");

  warga.forEach(w=>{
    let o=document.createElement("option");
    o.value=w.nama;
    o.textContent=w.nama;

    o.dataset.alamat=w.alamat;
    o.dataset.keamanan=w.keamanan;
    o.dataset.sampah=w.sampah;
    o.dataset.pembangunan=w.pembangunan;
    o.dataset.kas=w.kas;

    select.appendChild(o);
  });

  select.dispatchEvent(new Event("change"));
}

init();

// =================
// AUTO CHECKBOX
// =================
nama.onchange=function(){

  const o=this.selectedOptions[0];

  alamat.value=o.dataset.alamat;

  keamanan.checked = o.dataset.keamanan==1;
  sampah.checked = o.dataset.sampah==1;
  pembangunan.checked = o.dataset.pembangunan==1;
  kas.checked = o.dataset.kas==1;

  hitung();
};

// =================
// HITUNG
// =================
function hitung(){

  let bulan = Number(jumlah.value)||0;
  let per=0;

  if(keamanan.checked) per += BIAYA["keamanan"]||0;
  if(sampah.checked) per += BIAYA["sampah"]||0;
  if(pembangunan.checked) per += BIAYA["pembangunan"]||0;
  if(kas.checked) per += BIAYA["kas"]||0;

  total.innerText = (per*bulan).toLocaleString("id-ID");
}

["keamanan","sampah","pembangunan","kas","jumlah"]
.forEach(id=>{
  document.getElementById(id).addEventListener("change",hitung);
});

// =================
// SUBMIT
// =================
async function submit(){

  const data={
    action:"addIuran",
    nama:nama.value,
    alamat:alamat.value,
    jumlah_bulan:jumlah.value,
    keamanan:keamanan.checked?1:0,
    sampah:sampah.checked?1:0,
    pembangunan:pembangunan.checked?1:0,
    kas:kas.checked?1:0,
    metode:metode.value,
    keterangan:ket.value
  };

  const res=await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  const r=await res.json();

  alert("Total: "+r.total);
  location.reload();
}

</script>

</body>
</html>
