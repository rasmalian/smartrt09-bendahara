<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
  font-family:sans-serif;
  margin:0;
  background:#f5f6fa;
}

  .topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.topbar button{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#007bff;
  color:white;
  font-size:18px;
}
.container{
  max-width:480px;
  margin:auto;
  padding:12px;
}

/* HEADER BACK */
.header{
  display:flex;
  align-items:center;
  margin-bottom:10px;
}

.back{
  font-size:20px;
  cursor:pointer;
  margin-right:10px;
}

.title{
  font-weight:bold;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.check{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
}

.total{
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.warn{
  color:red;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="topbar">
  <button onclick="goBack()">&#8592;</button>
  <b>Iuran Warga</b>
</div>  

<div class="card">
<select id="nama"></select>
<input id="alamat" readonly>
<div id="tunggakanInfo" class="warn"></div>
</div>

<div class="card">
<input type="number" id="jumlah" value="1">
</div>

<div class="card">
<div class="check">Keamanan <input type="checkbox" id="keamanan"></div>
<div class="check">Sampah <input type="checkbox" id="sampah"></div>
<div class="check">Pembangunan <input type="checkbox" id="pembangunan"></div>
<div class="check">Kas <input type="checkbox" id="kas"></div>
</div>

<div class="card">
<b>Periode:</b>
<div id="periodeList"></div>
</div>

<div class="card total">
Total: Rp <span id="total">0</span>
</div>

<div class="card">
<select id="metode">
<option value="transfer">Transfer</option>
<option value="tunai">Tunai</option>
</select>
<input id="ket">
</div>

<button onclick="submit()">Simpan</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyEvc4ntv7M3bIMxkIRmRLM0sa-_-6uJnIh9uvAzzPBo5HlD9QmUEpIWpmZgOTYUVX4pQ/exec";

let BIAYA = {};
let lastPeriode = "";

// =================
// GET PARAM
// =================
function getParam(n){
  const url = new URL(window.location.href);
  return url.searchParams.get(n);
}

// =================
// NORMALIZE
// =================
function normalize(v){
  if(!v) return "";

  if(typeof v==="string" && v.length===7) return v;

  let d=new Date(v);
  if(isNaN(d)) return "";

  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

// =================
// GENERATE PERIODE
// =================
function generatePeriode(last,jumlah){

  if(!last) return [];

  let [y,m]=last.split("-").map(Number);
  let res=[];

  for(let i=1;i<=jumlah;i++){
    let mm=m+i,yy=y;
    while(mm>12){mm-=12;yy++}
    res.push(`${yy}-${String(mm).padStart(2,"0")}`);
  }

  return res;
}

// =================
// INIT
// =================
async function init(){

  const warga = await fetch(API+"?action=getWarga").then(r=>r.json());
  BIAYA = await fetch(API+"?action=getBiaya").then(r=>r.json());

  const selectedNama = getParam("nama");

  warga.forEach(w=>{
    let o=document.createElement("option");
    o.value=w.nama;
    o.textContent=w.nama;

    o.dataset.alamat=w.alamat;
    o.dataset.keamanan=w.keamanan;
    o.dataset.sampah=w.sampah;
    o.dataset.pembangunan=w.pembangunan;
    o.dataset.kas=w.kas;
    o.dataset.last=w.bayarterakhir;
    o.dataset.tunggakan=w.tunggakan;

    if(selectedNama && selectedNama === w.nama){
      o.selected = true;
    }

    nama.appendChild(o);
  });

  nama.addEventListener("change",onChangeUser);

  nama.dispatchEvent(new Event("change"));
}

init();

// =================
// CHANGE USER
// =================
function onChangeUser(){

  const o=nama.selectedOptions[0];

  alamat.value=o.dataset.alamat;

  keamanan.checked=o.dataset.keamanan==1;
  sampah.checked=o.dataset.sampah==1;
  pembangunan.checked=o.dataset.pembangunan==1;
  kas.checked=o.dataset.kas==1;

  lastPeriode = normalize(o.dataset.last);

  let t=o.dataset.tunggakan||0;

  tunggakanInfo.innerText =
    t>0 ? "Tunggakan "+t+" bulan" : "";

  hitung();
  renderPeriode();
}

// =================
// RENDER PERIODE
// =================
function renderPeriode(){

  let jumlahVal = Number(jumlah.value)||0;

  let list = generatePeriode(lastPeriode,jumlahVal);

  if(list.length===0){
    periodeList.innerHTML = "<i>-</i>";
    return;
  }

  periodeList.innerHTML = list.map(p=>`<div>${p}</div>`).join("");
}

// =================
// HITUNG
// =================
function hitung(){

  let bulan=Number(jumlah.value)||0;
  let per=0;

  if(keamanan.checked) per+=BIAYA.keamanan||0;
  if(sampah.checked) per+=BIAYA.sampah||0;
  if(pembangunan.checked) per+=BIAYA.pembangunan||0;
  if(kas.checked) per+=BIAYA.kas||0;

  total.innerText=(per*bulan).toLocaleString("id-ID");
}

// =================
// EVENT
// =================
["keamanan","sampah","pembangunan","kas","jumlah"]
.forEach(id=>{
  document.getElementById(id).addEventListener("input",()=>{
    hitung();
    renderPeriode();
  });
});

// =================
// BACK
// =================
function goBack(){
  window.location.href="index.html";
}

// =================
// SUBMIT
// =================
async function submit(){

  const data={
    action:"addIuran",
    nama:nama.value,
    alamat:alamat.value,
    jumlah_bulan:jumlah.value,
    periode_terakhir:lastPeriode,
    keamanan:keamanan.checked?1:0,
    sampah:sampah.checked?1:0,
    pembangunan:pembangunan.checked?1:0,
    kas:kas.checked?1:0,
    metode:metode.value,
    keterangan:ket.value
  };

  const res=await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  const r=await res.json();

  alert("Total: "+r.total);
  location.reload();
}

</script>

</body>
</html>
