<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iuran Warga</title>

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}
.container{max-width:500px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:12px}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #ddd}
button{width:100%;padding:14px;background:#007bff;color:#fff;border:none;border-radius:10px}
.preview{background:#eef6ff;padding:10px;border-radius:8px}
.warn{color:red;font-size:13px}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <label>Nama</label>
  <select id="nama"></select>

  <label>Alamat</label>
  <input id="alamat" readonly>

  <b>Terakhir bayar:</b>
  <div id="last">-</div>
  <div id="warn" class="warn"></div>
</div>

<div class="card">
  <label>Jumlah bulan</label>
  <input id="jumlah" type="number" value="1" min="1">

  <div id="preview" class="preview"></div>
</div>

<div class="card">
  <label><input type="checkbox" id="keamanan"> Keamanan</label>
  <label><input type="checkbox" id="sampah"> Sampah</label>
  <label><input type="checkbox" id="pembangunan"> Pembangunan</label>
  <label><input type="checkbox" id="kas"> Kas</label>
</div>

<div class="card">
  <label>Metode</label>
  <select id="metode">
    <option value="transfer">Transfer</option>
    <option value="tunai">Tunai</option>
  </select>

  <label>Keterangan</label>
  <input id="ket">
</div>

<button id="submit">Simpan</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxJAdcpu11QGuRhjNwwC3w9Efr4EMvAEai25SQs5xtRULh30oOj6u5h4CGMDLqL0e3_AA/exec";

let wargaData = [];
let lastPeriode = null;

// =======================
function el(id){ return document.getElementById(id); }

// =======================
// NORMALIZE PERIODE
// =======================
function normalize(val){
  if(!val) return null;

  if(typeof val === "string" && val.length === 7) return val;

  const d = new Date(val);
  if(isNaN(d)) return null;

  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

// =======================
function normStr(s){
  return String(s || "").trim().toLowerCase();
}

// =======================
function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

// =======================
function pnum(p){
  const [y,m] = p.split("-").map(Number);
  return y*12+m;
}

// =======================
async function loadWarga(){

  const res = await fetch(API + "?action=getWarga");
  wargaData = await res.json();

  console.log("DATA:", wargaData);

  const namaEl = el("nama");
  namaEl.innerHTML = "<option value=''>Pilih Warga</option>";

  wargaData.forEach(w=>{
    namaEl.innerHTML += `<option value="${w.nama}">${w.nama}</option>`;
  });

  // 🔥 AUTO SELECT DARI URL
  const paramNama = getParam("nama");

  if(paramNama){

    const found = wargaData.find(w =>
      normStr(w.nama) === normStr(paramNama)
    );

    if(found){
      namaEl.value = found.nama;
      namaEl.dispatchEvent(new Event("change"));
    } else {
      console.warn("Nama tidak ditemukan:", paramNama);
    }
  }
}

// =======================
function pilihWarga(){

  const namaVal = el("nama").value;

  const w = wargaData.find(x =>
    normStr(x.nama) === normStr(namaVal)
  );

  console.log("SELECTED:", w);

  if(!w) return;

  el("alamat").value = w.alamat || "";

  lastPeriode = normalize(w.bayarterakhir);

  el("last").innerText = lastPeriode || "-";

  setCheckbox("keamanan", w.keamanan);
  setCheckbox("sampah", w.sampah);
  setCheckbox("pembangunan", w.pembangunan);
  setCheckbox("kas", w.kas);

  checkTunggakan();
  updatePreview();
}

// =======================
function setCheckbox(id,val){
  const e = el(id);
  e.checked = Number(val) === 1;
  e.disabled = Number(val) === 0;
}

// =======================
function generatePeriode(last,jumlah){

  let [y,m] = last.split("-").map(Number);
  let result = [];

  for(let i=1;i<=jumlah;i++){

    let mm = m + i;
    let yy = y;

    while(mm > 12){
      mm -= 12;
      yy++;
    }

    result.push(`${yy}-${String(mm).padStart(2,"0")}`);
  }

  return result;
}

// =======================
function updatePreview(){

  if(!lastPeriode) return;

  const j = parseInt(el("jumlah").value);
  if(!j) return;

  const list = generatePeriode(lastPeriode, j);

  el("preview").innerHTML =
    "<b>Akan dibayar:</b><br>" + list.join("<br>");
}

el("jumlah").addEventListener("input", updatePreview);

// =======================
function checkTunggakan(){

  if(!lastPeriode) return;

  const now = new Date();
  const nowStr = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");

  if(pnum(lastPeriode) < pnum(nowStr)){
    el("warn").innerText = "⚠️ Ada tunggakan";
  } else {
    el("warn").innerText = "";
  }
}

// =======================
el("nama").addEventListener("change", pilihWarga);

// =======================
el("submit").addEventListener("click", async function(){

  if(!lastPeriode){
    alert("Pilih warga dulu");
    return;
  }

  const data = {
    action: "addIuran",
    nama: el("nama").value,
    alamat: el("alamat").value,
    periode_terakhir: lastPeriode,
    jumlah_bulan: parseInt(el("jumlah").value),
    keamanan: el("keamanan").checked,
    sampah: el("sampah").checked,
    pembangunan: el("pembangunan").checked,
    kas: el("kas").checked,
    metode: el("metode").value,
    keterangan: el("ket").value
  };

  console.log("SEND:", data);

  try{
    const res = await fetch(API,{
      method:"POST",
      body: JSON.stringify(data)
    });

    const result = await res.json();

    console.log("RESULT:", result);

    if(result.status === "success"){
      alert("Berhasil! Total: " + result.total);
      location.reload();
    }else{
      alert("Error!");
    }

  }catch(err){
    alert("Gagal kirim data");
    console.error(err);
  }

});

// =======================
loadWarga();

</script>

</body>
</html>
