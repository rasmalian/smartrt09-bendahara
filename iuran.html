<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}
body{font-family:sans-serif;margin:0;background:#f5f6fa;}
.container{max-width:480px;margin:auto;padding:12px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:12px;}
input,select{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid #ddd;}
.check{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;}
.check:last-child{border:none;}
.total{text-align:center;font-weight:bold;font-size:18px;}
.warn{color:red;font-size:14px;}
button{width:100%;padding:14px;background:#28a745;color:white;border:none;border-radius:10px;}
</style>
</head>

<body>

<div class="container">
  <div style="margin-bottom:10px;">
  <button onclick="goBack()" style="background:#6c757d;">
    ← Kembali
  </button>
</div>

<div class="card">
<select id="nama"></select>
<input id="alamat" readonly>
<div class="warn" id="tunggakanInfo"></div>
</div>

<div class="card">
<label>Jumlah bulan</label>
<input type="number" id="jumlah" value="1" min="1">
</div>

<div class="card">
<div class="check">Keamanan <input type="checkbox" id="keamanan"></div>
<div class="check">Sampah <input type="checkbox" id="sampah"></div>
<div class="check">Pembangunan <input type="checkbox" id="pembangunan"></div>
<div class="check">Kas <input type="checkbox" id="kas"></div>
</div>

<div class="card">
<b>Periode akan dibayar:</b>
<div id="periodeList"></div>
</div>

<div class="card total">
Total: Rp <span id="total">0</span>
</div>

<div class="card">
<select id="metode">
<option value="transfer">Transfer</option>
<option value="tunai">Tunai</option>
</select>
<input id="ket" placeholder="Keterangan">
</div>

<button onclick="submit()">Simpan</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbysWMaC_ECsWqO9C4bsjIR-tZXscG8E8jwM1KDv4FZuPi_EhZfnnAzu4BekuowHl8oB5w/exec";

let BIAYA = {};
let lastPeriode = "";

// =================
// NORMALIZE PERIODE (ANTI ERROR FORMAT)
// =================
function normalizePeriode(v){
  if(!v) return "";

  // sudah format YYYY-MM
  if(typeof v === "string" && v.length === 7 && v.includes("-")){
    return v;
  }

  // dari Date object / string panjang
  let d = new Date(v);
  if(isNaN(d)) return "";

  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}

// =================
// GENERATE PERIODE
// =================
function generatePeriode(last, jumlah){

  if(!last || jumlah <= 0) return [];

  let [y,m] = last.split("-").map(Number);
  let result = [];

  for(let i=1;i<=jumlah;i++){
    let mm = m + i;
    let yy = y;

    while(mm > 12){
      mm -= 12;
      yy++;
    }

    result.push(yy + "-" + String(mm).padStart(2,"0"));
  }

  return result;
}

// =================
// RENDER PERIODE
// =================
function renderPeriode(){

  const jumlah = Number(document.getElementById("jumlah").value) || 0;
  const el = document.getElementById("periodeList");

  if(!lastPeriode){
    el.innerHTML = "<i>Belum ada data bayar terakhir</i>";
    return;
  }

  const list = generatePeriode(lastPeriode, jumlah);

  if(list.length === 0){
    el.innerHTML = "<i>Tidak ada periode</i>";
    return;
  }

  el.innerHTML = list.map(p => `<div>${p}</div>`).join("");
}

// =================
// HITUNG TOTAL
// =================
function hitung(){

  let bulan = Number(jumlah.value) || 0;
  let per = 0;

  if(keamanan.checked) per += BIAYA.keamanan || 0;
  if(sampah.checked) per += BIAYA.sampah || 0;
  if(pembangunan.checked) per += BIAYA.pembangunan || 0;
  if(kas.checked) per += BIAYA.kas || 0;

  total.innerText = (per * bulan).toLocaleString("id-ID");
}

// =================
// INIT LOAD
// =================
async function init(){

  const warga = await fetch(API+"?action=getWarga").then(r=>r.json());
  BIAYA = await fetch(API+"?action=getBiaya").then(r=>r.json());

  const select = document.getElementById("nama");

  warga.forEach(w=>{
    let opt = document.createElement("option");

    opt.value = w.nama;
    opt.textContent = w.nama;

    opt.dataset.alamat = w.alamat;
    opt.dataset.keamanan = w.keamanan;
    opt.dataset.sampah = w.sampah;
    opt.dataset.pembangunan = w.pembangunan;
    opt.dataset.kas = w.kas;
    opt.dataset.last = w.bayarterakhir;
    opt.dataset.tunggakan = w.tunggakan;

    select.appendChild(opt);
  });

  select.addEventListener("change", onChangeUser);

  select.dispatchEvent(new Event("change"));
}

init();

// =================
// SAAT PILIH WARGA
// =================
function onChangeUser(){

  const o = nama.selectedOptions[0];

  alamat.value = o.dataset.alamat;

  keamanan.checked = o.dataset.keamanan == 1;
  sampah.checked = o.dataset.sampah == 1;
  pembangunan.checked = o.dataset.pembangunan == 1;
  kas.checked = o.dataset.kas == 1;

  lastPeriode = normalizePeriode(o.dataset.last);

  let t = Number(o.dataset.tunggakan || 0);

  tunggakanInfo.innerText =
    t > 0 ? "[!!] Tunggakan " + t + " bulan" : "";

  hitung();
  renderPeriode();
}

// =================
// EVENT LISTENER
// =================
["keamanan","sampah","pembangunan","kas","jumlah"]
.forEach(id=>{
  document.getElementById(id).addEventListener("input",()=>{
    hitung();
    renderPeriode();
  });
});

// =================
// SUBMIT
// =================
async function submit(){

  const data = {
    action:"addIuran",
    nama:nama.value,
    alamat:alamat.value,
    jumlah_bulan:jumlah.value,
    periode_terakhir:lastPeriode,
    keamanan:keamanan.checked?1:0,
    sampah:sampah.checked?1:0,
    pembangunan:pembangunan.checked?1:0,
    kas:kas.checked?1:0,
    metode:metode.value,
    keterangan:ket.value
  };

  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  const r = await res.json();

  alert("Total: " + r.total);
  location.reload();
}

</script>

</body>
</html>
