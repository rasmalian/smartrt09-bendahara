<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0;}
.container{max-width:500px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin:5px 0;}
.check-item{display:flex;gap:10px;padding:5px;}
button{width:100%;padding:12px;background:green;color:white;border:none;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<select id="nama"></select>
<input id="alamat" readonly>
</div>

<div class="card">
<input type="number" id="jumlah" value="1">
</div>

<div class="card">
<div class="check-item"><input type="checkbox" id="keamanan">Keamanan</div>
<div class="check-item"><input type="checkbox" id="sampah">Sampah</div>
<div class="check-item"><input type="checkbox" id="pembangunan">Pembangunan</div>
<div class="check-item"><input type="checkbox" id="kas">Kas</div>
</div>

<div class="card">
<b>Total: Rp <span id="total">0</span></b>
</div>

<div class="card">
<select id="metode">
<option value="transfer">Transfer</option>
<option value="tunai">Tunai</option>
</select>
<input id="ket">
</div>

<button onclick="submit()">Simpan</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxpMY3NMidcrB8oYd6PQ-7QaHOSH1X9B02C1cQ_RfaWwCirsfXQkLhox5FLz3Gu6_APqA/exec";

let BIAYA={};

// ===================
// INIT
// ===================
async function init(){

  const warga = await fetch(API+"?action=getWarga").then(r=>r.json());
  BIAYA = await fetch(API+"?action=getBiaya").then(r=>r.json());

  const select=document.getElementById("nama");

  warga.forEach(w=>{
    let o=document.createElement("option");
    o.value=w.nama;
    o.textContent=w.nama;

    o.dataset.alamat=w.alamat;
    o.dataset.keamanan=w.keamanan;
    o.dataset.sampah=w.sampah;
    o.dataset.pembangunan=w.pembangunan;
    o.dataset.kas=w.kas;

    select.appendChild(o);
  });

  select.dispatchEvent(new Event("change"));
}

init();

// ===================
// AUTO CHECKBOX
// ===================
document.getElementById("nama").onchange=function(){

  const o=this.selectedOptions[0];

  document.getElementById("alamat").value=o.dataset.alamat;

  document.getElementById("keamanan").checked = o.dataset.keamanan==1;
  document.getElementById("sampah").checked = o.dataset.sampah==1;
  document.getElementById("pembangunan").checked = o.dataset.pembangunan==1;
  document.getElementById("kas").checked = o.dataset.kas==1;

  hitung();
};

// ===================
// HITUNG TOTAL
// ===================
function hitung(){

  let perBulan=0;
  let bulan=Number(document.getElementById("jumlah").value)||0;

  if(document.getElementById("keamanan").checked) perBulan+=BIAYA.keamanan||0;
  if(document.getElementById("sampah").checked) perBulan+=BIAYA.sampah||0;
  if(document.getElementById("pembangunan").checked) perBulan+=BIAYA.pembangunan||0;
  if(document.getElementById("kas").checked) perBulan+=BIAYA.kas||0;

  document.getElementById("total").innerText =
    (perBulan*bulan).toLocaleString("id-ID");
}

["keamanan","sampah","pembangunan","kas","jumlah"]
.forEach(id=>{
  document.getElementById(id).addEventListener("change",hitung);
});

// ===================
// SUBMIT
// ===================
async function submit(){

  const data={
    action:"addIuran",
    nama:nama.value,
    alamat:alamat.value,
    jumlah_bulan:jumlah.value,
    keamanan:keamanan.checked?1:0,
    sampah:sampah.checked?1:0,
    pembangunan:pembangunan.checked?1:0,
    kas:kas.checked?1:0,
    metode:metode.value,
    keterangan:ket.value
  };

  const res=await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  const r=await res.json();

  alert("Total: "+r.total);
  location.reload();
}

</script>

</body>
</html>
