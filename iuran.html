<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.topbar button{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#007bff;
  color:white;
  font-size:18px;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

/* DROPDOWN */
.select{
  appearance:none;
  -webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg fill='%23007bff' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 10px center;
}

/* CHECKBOX GROUP */
.check-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.check-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px;
  border-radius:8px;
  background:#f8f9fa;
}

.check-item input{
  width:auto;
}

/* BUTTON */
button.submit{
  width:100%;
  padding:14px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

/* PREVIEW */
.preview{
  background:#eef6ff;
  padding:10px;
  border-radius:8px;
  font-size:14px;
}

.warn{
  color:red;
  font-size:13px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">&#8592;</button>
  <b>Iuran Warga</b>
</div>

<div class="container">

<div class="card">
  <label>Nama</label>
  <select id="nama" class="select"></select>

  <label>Alamat</label>
  <input id="alamat" readonly>

  <b>Terakhir bayar:</b>
  <div id="last">-</div>
  <div id="warn" class="warn"></div>
</div>

<div class="card">
  <label>Jumlah bulan</label>
  <input id="jumlah" type="number" value="1" min="1">

  <div id="preview" class="preview"></div>
</div>

<div class="card check-group">
  <div class="check-item">
    <input type="checkbox" id="keamanan">
    <label for="keamanan">Keamanan</label>
  </div>
  <div class="check-item">
    <input type="checkbox" id="sampah">
    <label for="sampah">Sampah</label>
  </div>
  <div class="check-item">
    <input type="checkbox" id="pembangunan">
    <label for="pembangunan">Pembangunan</label>
  </div>
  <div class="check-item">
    <input type="checkbox" id="kas">
    <label for="kas">Kas</label>
  </div>
</div>

<div class="card">
  <label>Metode</label>
  <select id="metode" class="select">
    <option value="transfer">Transfer</option>
    <option value="tunai">Tunai</option>
  </select>

  <label>Keterangan</label>
  <input id="ket">
</div>

<button class="submit" id="submit">Simpan</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzlylLsNCxlslKyVlCbODBYIwEkwVONcNwqbVitaq3ZFKti_km2s_r4pvJn9p2fQcxyYg/exec";

let wargaData=[];
let lastPeriode=null;

function el(id){return document.getElementById(id);}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="index.html";
  }
}

// =======================
function normalize(val){
  if(!val) return null;
  if(typeof val==="string" && val.length===7) return val;

  const d=new Date(val);
  if(isNaN(d)) return null;

  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function normStr(s){
  return String(s||"").trim().toLowerCase();
}

function getParam(name){
  const url=new URL(window.location.href);
  return url.searchParams.get(name);
}

function pnum(p){
  const [y,m]=p.split("-").map(Number);
  return y*12+m;
}

// =======================
async function loadWarga(){

  const res=await fetch(API+"?action=getWarga");
  wargaData=await res.json();

  const namaEl=el("nama");
  namaEl.innerHTML="<option value=''>Pilih Warga</option>";

  wargaData.forEach(w=>{
    namaEl.innerHTML+=`<option value="${w.nama}">${w.nama}</option>`;
  });

  const paramNama=getParam("nama");

  if(paramNama){
    const found=wargaData.find(w=>normStr(w.nama)===normStr(paramNama));
    if(found){
      namaEl.value=found.nama;
      namaEl.dispatchEvent(new Event("change"));
    }
  }
}

// =======================
function pilihWarga(){

  const w=wargaData.find(x=>normStr(x.nama)===normStr(el("nama").value));
  if(!w) return;

  el("alamat").value=w.alamat||"";

  lastPeriode=normalize(w.bayarterakhir);
  el("last").innerText=lastPeriode||"-";

  setCB("keamanan",w.keamanan);
  setCB("sampah",w.sampah);
  setCB("pembangunan",w.pembangunan);
  setCB("kas",w.kas);

  checkTunggakan();
  updatePreview();
}

// =======================
function setCB(id,v){
  const e=el(id);
  e.checked=Number(v)===1;
  e.disabled=Number(v)===0;
}

// =======================
function generate(last,j){

  let [y,m]=last.split("-").map(Number);
  let res=[];

  for(let i=1;i<=j;i++){
    let mm=m+i,yy=y;
    while(mm>12){mm-=12;yy++}
    res.push(`${yy}-${String(mm).padStart(2,"0")}`);
  }

  return res;
}

// =======================
function updatePreview(){

  if(!lastPeriode) return;

  const j=parseInt(el("jumlah").value);
  if(!j) return;

  const list=generate(lastPeriode,j);

  el("preview").innerHTML=
    "<b>Akan dibayar:</b><br>"+list.join("<br>");
}

el("jumlah").addEventListener("input",updatePreview);

// =======================
function checkTunggakan(){

  if(!lastPeriode) return;

  const now=new Date();
  const nowStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");

  el("warn").innerText =
    (pnum(lastPeriode)<pnum(nowStr)) ? "[!] Ada tunggakan" : "";
}

// =======================
el("nama").addEventListener("change",pilihWarga);

// =======================
el("submit").addEventListener("click",async function(){

  if(!lastPeriode){
    alert("Pilih warga dulu");
    return;
  }

  const data={
    action:"addIuran",
    nama:el("nama").value,
    alamat:el("alamat").value,
    periode_terakhir:lastPeriode,
    jumlah_bulan:parseInt(el("jumlah").value),
    keamanan:el("keamanan").checked,
    sampah:el("sampah").checked,
    pembangunan:el("pembangunan").checked,
    kas:el("kas").checked,
    metode:el("metode").value,
    keterangan:el("ket").value
  };

  await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  alert("Berhasil");
  location.reload();
});

// =======================
loadWarga();

</script>

</body>
</html>
