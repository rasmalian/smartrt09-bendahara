<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
}

.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
}

.topbar button{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#007bff;
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:8px;
}

.plus{color:green}
.minus{color:red}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">&#8592;</button>
  <b>Report</b>
</div>

<div class="container">

<div class="card">
<input type="month" id="bulan">
<button onclick="load()">Load</button>
</div>

<div id="summary" class="card"></div>
<div id="list"></div>

</div>

<!-- LOADING -->
<div id="loading" style="
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">
<div style="
padding:20px;
background:white;
border-radius:10px;
">⏳ Loading...</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyEvc4ntv7M3bIMxkIRmRLM0sa-_-6uJnIh9uvAzzPBo5HlD9QmUEpIWpmZgOTYUVX4pQ/exec";

function showLoading(){loading.style.display="flex";}
function hideLoading(){loading.style.display="none";}

function goBack(){
  if(document.referrer) history.back();
  else location.href="index.html";
}

async function load(){

  showLoading();

  try{

    const ym=bulan.value;

    let url=API+"?action=getReport";
    if(ym) url+="&ym="+ym;

    const res=await fetch(url);
    const data=await res.json();

    let total=0;
    list.innerHTML="";

    data.forEach(r=>{
      const val=Number(r.nilai)||0;
      total+=val;

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
      ${r.tanggal||"-"}<br>
      ${r.kategori||"-"}<br>
      <b class="${val>=0?'plus':'minus'}">${val}</b>
      `;

      list.appendChild(div);
    });

    summary.innerHTML=`
    <b>${ym||"Bulan Ini"}</b><br>
    Total: ${total}
    `;

  }finally{
    hideLoading();
  }
}

window.onload=load;

</script>

</body>
</html>
