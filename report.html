<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Transaksi</title>

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}
.container{max-width:500px;margin:auto;padding:15px}
.card{background:white;padding:12px;border-radius:10px;margin-bottom:10px}
input,button{width:100%;padding:12px;margin:5px 0;border-radius:8px;border:1px solid #ddd}
button{background:#007bff;color:white;border:none}
.summary{background:#eef6ff}
.row{display:flex;justify-content:space-between}
.plus{color:green}
.minus{color:red}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <label>Pilih Bulan (opsional)</label>
  <input type="month" id="bulan">
  <button onclick="load()">Load Manual</button>
</div>

<div class="card summary" id="summary">
  Loading...
</div>

<div id="list"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby213wlg7xs-J_0rXmF-8AOqcpqsgZAsc54xM0ZHp5WJOL_x1Eyvxwq8hRILj73Vp26/exec";

function el(id){ return document.getElementById(id); }

// =======================
// FORMAT TANGGAL
// =======================
function formatDate(d){
  if(!d) return "-";
  const date = new Date(d);
  if(isNaN(date)) return d;
  return date.toLocaleDateString("id-ID");
}

// =======================
// LOAD REPORT
// =======================
async function load(){

  const ym = el("bulan").value;

  let url = API + "?action=getReport";

  // hanya kirim jika ada
  if(ym){
    url += "&ym=" + ym;
  }

  try{

    const res = await fetch(url);
    const data = await res.json();

    console.log("REPORT:", data);

    let total = 0;
    let masuk = 0;
    let keluar = 0;

    const list = el("list");
    list.innerHTML = "";

    data.forEach(r=>{

      const nilai = Number(r.nilai) || 0;

      total += nilai;

      if(nilai > 0) masuk += nilai;
      if(nilai < 0) keluar += nilai;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div>${formatDate(r.tanggal)}</div>
        <div>${r.kategori || "-"}</div>
        <div class="${nilai>=0?'plus':'minus'}">
          ${nilai.toLocaleString()}
        </div>
      `;

      list.appendChild(div);
    });

    const periodeLabel = ym ? ym : "Bulan Ini";

    el("summary").innerHTML = `
      <b>Periode: ${periodeLabel}</b><br><br>
      <div class="row"><span>Total</span><b>${total.toLocaleString()}</b></div>
      <div class="row"><span>Pemasukan</span><span class="plus">${masuk.toLocaleString()}</span></div>
      <div class="row"><span>Pengeluaran</span><span class="minus">${keluar.toLocaleString()}</span></div>
    `;

  }catch(err){
    alert("Gagal load report");
    console.error(err);
  }
}

// =======================
// AUTO LOAD BULAN INI
// =======================
window.onload = function(){
  load();
};

</script>

</body>
</html>
