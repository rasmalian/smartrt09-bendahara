<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}

.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.topbar button{
  width:40px;height:40px;border:none;border-radius:50%;
  background:#007bff;color:white;font-size:18px;
}

.container{max-width:500px;margin:auto;padding:15px}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

.plus{color:green}
.minus{color:red}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">←</button>
  <b>Report</b>
</div>

<div class="container">

<div class="card">
  <input type="month" id="bulan">
  <button onclick="load()">Load</button>
</div>

<div class="card" id="summary"></div>
<div id="list"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycby213wlg7xs-J_0rXmF-8AOqcpqsgZAsc54xM0ZHp5WJOL_x1Eyvxwq8hRILj73Vp26/exec";

function el(id){return document.getElementById(id);}

function goBack(){
  location.href="index.html";
}

async function load(){

  const ym=el("bulan").value;

  let url=API+"?action=getReport";
  if(ym) url+="&ym="+ym;

  const res=await fetch(url);
  const data=await res.json();

  let total=0;

  el("list").innerHTML="";

  data.forEach(r=>{
    const val=Number(r.nilai)||0;
    total+=val;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      ${r.tanggal}<br>
      ${r.kategori}<br>
      <b class="${val>=0?'plus':'minus'}">${val}</b>
    `;

    el("list").appendChild(div);
  });

  el("summary").innerHTML=`
    Periode: ${ym||"Bulan Ini"}<br>
    Total: ${total}
  `;
}

window.onload=load;

</script>

</body>
</html>
