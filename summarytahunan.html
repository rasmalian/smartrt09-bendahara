<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
}

.topbar button{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#007bff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  width:100%;
  padding:10px;
}

/* FILTER */
.filter{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* BUTTON */
button.main{
  width:100%;
  padding:12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

/* WRAP (INI KUNCI STICKY) */
.table-wrap{
  width:100%;
  overflow:auto;        /* penting */
  max-height:70vh;      /* biar header bisa sticky */
}

/* TABLE */
table{
  border-collapse:collapse;
  min-width:1000px;
  background:white;
}

/* CELL */
th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
  font-size:15px;
}

/* HEADER BULAN (STICKY ATAS) */
th{
  position:sticky;
  top:0;
  background:white;
  z-index:5;
}

/* KOLOM NAMA (STICKY KIRI) */
td:first-child{
  position:sticky;
  left:0;
  background:white;
  z-index:3;
  text-align:left;
  min-width:140px;
  font-weight:bold;
}

/* HEADER NAMA (POJOK KIRI ATAS) */
th:first-child{
  position:sticky;
  top:0;
  left:0;
  background:white;
  z-index:6;
  text-align:left;
}

/* ALAMAT (TIDAK STICKY) */
td:nth-child(2){
  text-align:left;
  min-width:160px;
}

/* ZEBRA */
tbody tr:nth-child(even){
  background:#f9fafb;
}

/* STATUS */
.ok{
  color:green;
  font-weight:bold;
}
.no{
  color:#ccc;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* CLICKABLE */
.clickable{
  cursor:pointer;
  color:#007bff;
  font-weight:bold;
  text-decoration:underline;
}

/* TAP AREA */
td{
  min-height:44px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">&#8592;</button>
  <b>Summary Tahunan</b>
</div>

<div class="container">

  <div class="filter">
    <label>Tahun</label>
    <input type="number" id="tahun">
    <button class="main" onclick="load()">Load</button>
  </div>

  <div class="table-wrap">
    <table id="tbl"></table>
  </div>

</div>

<div id="loading">Loading...</div>

<script>

function goSummary(nama){
  const year = document.getElementById("tahun").value;

  location.href =
    "summarywarga.html?nama=" +
    encodeURIComponent(nama) +
    "&year=" + year;
}

const API = "https://script.google.com/macros/s/AKfycbwyDkIMsu9DhMBE03QxvntRGwCm5a64BRb5SKEddnx7wdkWgRuWw6HLzUanAAGG9cSH1w/exec";

function showLoading(){
  document.getElementById("loading").style.display="flex";
}
function hideLoading(){
  document.getElementById("loading").style.display="none";
}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="dashboard.html";
  }
}

function el(id){
  return document.getElementById(id);
}

function buildMonths(year){
  let arr=[];
  for(let i=1;i<=12;i++){
    arr.push(year+"-"+String(i).padStart(2,"0"));
  }
  return arr;
}

function formatTanggal(v){
  if(!v) return "";
  let d = new Date(v);
  if(isNaN(d)) return "";
  return d.toLocaleDateString("id-ID");
}

async function load(){

  showLoading();

  try{

    const year = el("tahun").value;

    const res = await fetch(API+"?action=getSummary&year="+year);
    const data = await res.json();

    const months = buildMonths(year);

    let html = "<thead><tr>";
    html += "<th>Nama</th><th>Alamat</th>";

    months.forEach(m=>{
      html += `<th>${m}</th>`;
    });

    html += "</tr></thead><tbody>";

    Object.keys(data).forEach(nama=>{

      const w = data[nama];

      html += `<tr>`;
      html += `<td class="clickable" onclick="goSummary('${nama}')">${nama}</td>`;
      html += `<td>${w.alamat || ""}</td>`;

      months.forEach(m=>{

        let cell = w.bulan[m];

        if(cell && cell.tanggal_bayar){
          html += `<td class="ok">
            ${formatTanggal(cell.tanggal_bayar)}
          </td>`;
        }else{
          html += `<td class="no">-</td>`;
        }

      });

      html += `</tr>`;

    });

    html += "</tbody>";

    el("tbl").innerHTML = html;

  }catch(e){
    alert("Gagal load data");
  }finally{
    hideLoading();
  }
}

window.onload = ()=>{
  el("tahun").value = new Date().getFullYear();
  load();
};

</script>

</body>
</html>
