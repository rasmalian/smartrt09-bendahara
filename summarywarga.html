<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
}

.topbar button{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#007bff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  width:100%;
  padding:10px;
}

/* FILTER */
.filter{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button.main{
  width:100%;
  padding:12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

/* WRAP (WAJIB UNTUK STICKY) */
.table-wrap{
  width:100%;
  overflow:auto;        /* penting */
  max-height:70vh;      /* biar header sticky jalan */
}

/* TABLE */
table{
  border-collapse:collapse;
  min-width:900px;
  background:white;
}

th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
  font-size:15px;
}

/* HEADER BULAN */
th{
  position:sticky;
  top:0;
  background:white;
  z-index:5;
}

/* KOLOM NAMA (STICKY) */
td:first-child{
  position:sticky;
  left:0;
  background:white;
  z-index:3;
  text-align:left;
  min-width:140px;
  font-weight:bold;
}

/* HEADER NAMA */
th:first-child{
  position:sticky;
  top:0;
  left:0;
  background:white;
  z-index:6;
  text-align:left;
}

/* ALAMAT (TIDAK STICKY) */
td:nth-child(2){
  text-align:left;
  min-width:160px;
}

/* ZEBRA */
tbody tr:nth-child(even){
  background:#f9fafb;
}

/* STATUS */
.ok{
  color:green;
  font-weight:bold;
}
.no{
  color:#ccc;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* TAP AREA */
td{
  min-height:44px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">&#8592;</button>
  <b id="title">Summary Warga</b>
</div>

<div class="container">

  <div class="filter">
    <label>Tahun</label>
    <input type="number" id="tahun">
    <button class="main" onclick="load()">Load</button>
  </div>

  <div class="table-wrap">
    <table id="tbl"></table>
  </div>

</div>

<div id="loading">Loading...</div>

<script>
const isLogin = localStorage.getItem("login");

if (!isLogin || isLogin !== "true") {
  window.location.replace("login.html");
}
const API="https://script.google.com/macros/s/AKfycbwyDkIMsu9DhMBE03QxvntRGwCm5a64BRb5SKEddnx7wdkWgRuWw6HLzUanAAGG9cSH1w/exec";

function showLoading(){
  document.getElementById("loading").style.display="flex";
}
function hideLoading(){
  document.getElementById("loading").style.display="none";
}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="dashboard.html";
  }
}

function el(id){
  return document.getElementById(id);
}

function getParam(n){
  return new URLSearchParams(location.search).get(n);
}

function buildMonths(year){
  let arr=[];
  for(let i=1;i<=12;i++){
    arr.push(year+"-"+String(i).padStart(2,"0"));
  }
  return arr;
}

function fmtDate(v){
  if(!v) return "";
  let d = new Date(v);
  return isNaN(d) ? "" : d.toLocaleDateString("id-ID");
}

async function load(){

  showLoading();

  try{

    const nama = getParam("nama") || "";
    const year = el("tahun").value;

    document.getElementById("title").innerText = "Summary: " + nama;

    const res = await fetch(
      API + "?action=getSummary&mode=warga&nama=" + 
      encodeURIComponent(nama) + "&year=" + year
    );

    const data = await res.json();

    const months = buildMonths(year);

    let html = "<thead><tr>";
    html += "<th>Nama</th><th>Alamat</th>";

    months.forEach(m=>{
      html += `<th>${m}</th>`;
    });

    html += "</tr></thead><tbody>";

    html += "<tr>";
    html += `<td>${nama}</td>`;
    html += `<td>${data.alamat || ""}</td>`;

    months.forEach(m=>{

      let cell = data.bulan ? data.bulan[m] : null;

      if(cell && cell.tanggal_bayar){
        html += `<td class="ok">${fmtDate(cell.tanggal_bayar)}</td>`;
      }else{
        html += `<td class="no">-</td>`;
      }

    });

    html += "</tr></tbody>";

    el("tbl").innerHTML = html;

  }catch(e){
    alert("Gagal load data");
  }finally{
    hideLoading();
  }
}

window.onload = ()=>{
  el("tahun").value = new Date().getFullYear();
  load();
};

</script>

</body>
</html>
