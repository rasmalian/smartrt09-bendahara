<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
}

.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
}

.topbar button{
  width:40px;height:40px;
  border:none;
  border-radius:50%;
  background:#007bff;
  color:white;
  font-size:18px;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:10px;
}

/* LOADING */
#loadingOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.spinner{
  width:50px;height:50px;
  border:5px solid #fff;
  border-top:5px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div>Memproses...</div>
</div>

<div class="topbar">
  <button onclick="history.back()">&#8592;</button>
  <b>Transaksi</b>
</div>

<div class="container">

<div class="card">

<select id="jenis">
  <option value="pemasukan">Pemasukan</option>
  <option value="pengeluaran">Pengeluaran</option>
</select>

<input type="date" id="tanggal">
<input id="kategori" placeholder="Keterangan">
<input type="text" id="nilai" placeholder="Nominal">
<input id="ket" placeholder="catatan">

</div>

<button onclick="submit()">Simpan</button>

</div>

<script>
const isLogin = localStorage.getItem("login");

if (!isLogin || isLogin !== "true") {
  window.location.replace("login.html");
}
const API="https://script.google.com/macros/s/AKfycby4skg8yWNJjAC4bUlOUi1XV3LmT1y3nEXVFdWPcVI461y3MWksXRRHQjytvhPpvNkNtA/exec";

function formatRupiah(angka){
  return Number(angka).toLocaleString("id-ID");
}

function cleanNumber(str){
  return str.replace(/\D/g,''); // hapus titik, huruf, dll
}  
function showLoading(){
  document.getElementById("loadingOverlay").style.display="flex";
}
function hideLoading(){
  document.getElementById("loadingOverlay").style.display="none";
}


const nominalInput = document.getElementById("nilai");

nominalInput.addEventListener("input", function(e){

  let value = cleanNumber(e.target.value);

  if(!value){
    e.target.value = "";
    return;
  }

  e.target.value = formatRupiah(value);
});  

let lock=false;

async function submit(){

  if(lock) return;
  lock=true;

  showLoading();

  try{

    const data={
      action:"addTransaksiManual",
      jenis:document.getElementById("jenis").value,
      tanggal:document.getElementById("tanggal").value,
      kategori:document.getElementById("kategori").value,
      nilai:Number(cleanNumber(document.getElementById("nilai").value)),
      keterangan:document.getElementById("ket").value
    };

    await fetch(API,{
      method:"POST",
      body:JSON.stringify(data)
    });

    hideLoading();
    lock=false;

    alert("Tersimpan");
    location.reload();

  }catch(e){
    hideLoading();
    lock=false;
    alert("Error");
  }

}

document.getElementById("tanggal").value=
new Date().toISOString().split("T")[0];

</script>

</body>
</html>
