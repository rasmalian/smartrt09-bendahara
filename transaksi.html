<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:#f5f6fa;
  margin:0;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.topbar button{
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#007bff;
  color:white;
  font-size:18px;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

/* BUTTON */
button.submit{
  width:100%;
  padding:14px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">&#8592;</button>
  <b>Transaksi</b>
</div>

<div class="container">

<div class="card">

  <label>Jenis</label>
  <select id="jenis">
    <option value="pemasukan">Pemasukan</option>
    <option value="pengeluaran">Pengeluaran</option>
  </select>

  <label>Tanggal</label>
  <input type="date" id="tanggal">

  <label>Kategori</label>
  <input id="kategori" placeholder="Contoh: kerja bhakti">

  <label>Nominal</label>
  <input type="number" id="nilai">

  <label>Keterangan</label>
  <input id="ket">

</div>

<button class="submit" onclick="submit()">Simpan</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzlylLsNCxlslKyVlCbODBYIwEkwVONcNwqbVitaq3ZFKti_km2s_r4pvJn9p2fQcxyYg/exec";

function el(id){return document.getElementById(id);}

function goBack(){
  if(document.referrer){
    history.back();
  }else{
    location.href="index.html";
  }
}

el("tanggal").value=new Date().toISOString().split("T")[0];

async function submit(){

  const data={
    action:"addTransaksiManual",
    jenis:el("jenis").value,
    tanggal:el("tanggal").value,
    kategori:el("kategori").value,
    nilai:parseInt(el("nilai").value),
    keterangan:el("ket").value
  };

  await fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  });

  alert("Tersimpan");
  location.reload();
}

</script>

</body>
</html>
